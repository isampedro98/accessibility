<!doctype html>
<html lang="es">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Universidad | Novedades</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
  </head>

  <body>
    <div data-include="site-header"></div>
    <main id="main">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="index.html">Inicio</a></li>
          <li aria-current="page">Novedades</li>
        </ol>
      </nav>

      <section style="padding: 20px;" aria-labelledby="novedades-titulo">
        <h1 id="novedades-titulo">Portal de Noticias Institucionales</h1>

        <section aria-labelledby="archivo-novedades">
          <h2 id="archivo-novedades">Archivo de novedades institucionales</h2>
          <div id="news-archive" class="news-archive" aria-live="polite"></div>
        </section>

        <section style="margin-top: 20px;" aria-labelledby="mensaje-rectorado">
          <h2 id="mensaje-rectorado">Mensaje del Rectorado</h2>
          <video controls preload="metadata">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <track kind="subtitles" src="media/subtitulos.vtt" srclang="es" label="Español">
            Tu navegador no soporta el elemento de video.
          </video>
        </section>
      </section>
    </main>
    <div data-include="site-footer"></div>
    <script src="js/load-partials.js"></script>
    <script type="module" src="js/render-news.js"></script>
  </body>

</html>

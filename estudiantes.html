<!doctype html>
<html lang="es">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Universidad | Portal de estudiantes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
  </head>

  <body>
    <div data-include="site-header"></div>
    <main id="main">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="index.html">Inicio</a></li>
          <li aria-current="page">Portal de estudiantes</li>
        </ol>
      </nav>

      <section style="padding: 30px;" aria-labelledby="portal-estudiantes-titulo">
        <h1 id="portal-estudiantes-titulo">Portal de estudiantes</h1>
        <h2>Ingreso al Sistema Siu-Guarani Universitario v9.8.2</h2>

        <form onsubmit="simularLogin(event)">
          <p id="form-error"></p>
          <fieldset>
            <legend>Datos de acceso</legend>
            <p id="login-help">Complete su matricula universitaria y su clave alfanumerica para ingresar.</p>

            <label for="user">Matricula universitaria</label>
            <input type="text" id="user" name="user" autocomplete="username" aria-describedby="login-help">

            <label for="pass">Clave alfanumerica</label>
            <input type="password" id="pass" name="pass" autocomplete="current-password">

            <label>
              <input type="checkbox" id="remember-session" name="remember-session">
              Recordar sesion en este equipo
            </label>
          </fieldset>

          <button class="btn" type="submit">Ingresar</button>
        </form>
      </section>
    </main>
    <div data-include="site-footer"></div>
    <script src="js/load-partials.js"></script>
    <script src="js/scripts.js"></script>
  </body>

</html>

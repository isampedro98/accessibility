<!doctype html>
<html lang="es">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIU Guaran&iacute; | Portal de estudiantes</title>
    <link rel="icon" href="images/noticia_modulo_Guarani.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/global.css">
  </head>

  <body>
    <div data-include="site-header"></div>
    <main id="main">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="index.html">Inicio</a></li>
          <li aria-current="page">Portal de estudiantes</li>
        </ol>
      </nav>

      <section class="page-section page-section--spacious" aria-labelledby="portal-estudiantes-titulo">
        <h1 id="portal-estudiantes-titulo">Portal de estudiantes</h1>
        <h2>Ingreso al Sistema Siu-Guarani Universitario v9.8.2</h2>

        <form id="login-form" action="#" method="post" novalidate>
          <p class="helper-text">Los campos obligatorios se marcan con <span class="required-indicator" aria-hidden="true">*</span>.</p>
          <p id="form-error"></p>
          <fieldset>
            <legend>Datos de acceso</legend>
            <p id="login-help">Complete su matr&iacute;cula universitaria y su clave alfanum&eacute;rica para ingresar.</p>

            <label for="user">Matr&iacute;cula universitaria <span class="required-indicator" aria-hidden="true">*</span></label>
            <input type="text" id="user" name="user" autocomplete="username" aria-describedby="login-help" required>

            <label for="pass">Clave alfanum&eacute;rica <span class="required-indicator" aria-hidden="true">*</span></label>
            <input type="password" id="pass" name="pass" autocomplete="current-password" required>

            <label>
              <input type="checkbox" id="remember-session" name="remember-session">
              Recordar sesi&oacute;n en este equipo
            </label>
          </fieldset>

          <div class="honeypot-field" aria-hidden="true">
            <label for="website">Si usted es una persona, deje este campo vac&iacute;o</label>
            <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
          </div>

          <button class="btn" type="submit">Ingresar</button>
        </form>
      </section>
    </main>
    <div data-include="site-footer"></div>
    <script src="js/session.js"></script>
    <script src="js/load-partials.js"></script>
    <script src="js/portal-login.js"></script>
  </body>

</html>
